name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Pushes static HTML to gh-pages branch — works without pre-enabling "GitHub Actions" Pages source.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p public
          cp architecture.html public/index.html
          cp architecture.html public/architecture.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
